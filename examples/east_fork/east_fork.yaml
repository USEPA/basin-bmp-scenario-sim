# Example East Fork (OH) watershed configuration (synthetic data)
verbose: true
outputs:  ./examples/east_fork/outputs

random_seed: 42

# Required geospatial inputs
domain: ./examples/east_fork/inputs/domain.gpkg
parcels: ./examples/east_fork/inputs/parcels.gpkg
outlet_loc: ./examples/east_fork/inputs/outlet_loc.gpkg

# Drainage and selection
parcel_out: ./examples/east_fork/inputs/parcel_out.csv
parcel_up: ./examples/east_fork/inputs/parcel_up.csv
parcel_p: ./examples/east_fork/inputs/parcel_p.csv

# Pollutants and BMPs
pollutants: ["TN","TP"]
cps: [340,329,590,412,656]

# Required distributions
pollutant_yield: ./examples/east_fork/inputs/pollutant_yield.csv
bmp_efficiency: ./examples/east_fork/inputs/bmp_efficiency.csv

# Optional distributions (enable cost-limited runs, selection weighting, and plotting x-axis)
bmp_cost: ./examples/east_fork/inputs/bmp_cost.csv

# Optional delivery ratios and targets/means for plotting y-axes
#delivery_ratios: ./examples/east_fork/inputs/delivery_ratios.csv
outlet_target: ./examples/east_fork/inputs/outlet_target.csv
outlet_mean: ./examples/east_fork/inputs/outlet_mean.csv

# number of scenarios to run
n_scenarios: 5

# per-scenario bmp limits
bmp_limit_n: 50
#bmp_limit_usd: 10000000

# optional assumed buffer depth (ft) for grassed waterways
buffer_depth_ft: 35
